<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starfighter Controls</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <p class="eyebrow">Calculator Soundboard</p>
        <h1>Every calculator button now lands with a rude little toot.</h1>
        <p class="lede">
          Tap any button to trigger a short synthesized fart effect with a slightly
          different pitch and wobble.
        </p>
      </section>

      <section class="button-grid" aria-label="Calculator buttons">
        <button class="control-button" data-sound-variant="0" type="button">
          7
        </button>
        <button class="control-button" data-sound-variant="1" type="button">
          8
        </button>
        <button class="control-button" data-sound-variant="2" type="button">
          9
        </button>
        <button class="control-button" data-sound-variant="3" type="button">
          +
        </button>
      </section>

      <p class="footnote">
        Audio starts on first interaction to comply with browser autoplay rules.
      </p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>

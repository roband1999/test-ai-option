<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="calculator" aria-label="Calculator">
      <div class="display-wrap">
        <p class="eyebrow">Basic Web Calculator</p>
        <output id="display" class="display" aria-live="polite">0</output>
      </div>

      <div class="keypad">
        <button type="button" class="key key--muted" data-action="clear">C</button>
        <button type="button" class="key key--muted" data-action="backspace">DEL</button>
        <button type="button" class="key key--accent" data-value="/">/</button>
        <button type="button" class="key key--accent" data-value="*">*</button>

        <button type="button" class="key" data-value="7">7</button>
        <button type="button" class="key" data-value="8">8</button>
        <button type="button" class="key" data-value="9">9</button>
        <button type="button" class="key key--accent" data-value="-">-</button>

        <button type="button" class="key" data-value="4">4</button>
        <button type="button" class="key" data-value="5">5</button>
        <button type="button" class="key" data-value="6">6</button>
        <button type="button" class="key key--accent" data-value="+">+</button>

        <button type="button" class="key" data-value="1">1</button>
        <button type="button" class="key" data-value="2">2</button>
        <button type="button" class="key" data-value="3">3</button>
        <button type="button" class="key key--equal" data-action="evaluate" rowspan="2">=</button>

        <button type="button" class="key key--wide" data-value="0">0</button>
        <button type="button" class="key" data-value=".">.</button>
      </div>
    </section>
  </main>

  <script src="calculator-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
